name: Build CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Clean and Build Archive
        run: |
          # تنظيف أي إعدادات قديمة في المشروع
          xcodebuild clean -project CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj -scheme CarPlaySwiftUI
          
          # بناء الأرشيف بدون الحاجة لتوقيع أو شهادات
          xcodebuild archive \
            -project CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj \
            -scheme CarPlaySwiftUI \
            -archivePath build/CarPlaySwiftUI.xcarchive \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA from Simulator Build
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/CarPlaySwiftUI.xcarchive/Products/Applications/*.app build/ipa/Payload/
          cd build/ipa
          # تحويل التطبيق إلى ملف IPA مضغوط
          zip -r MyCarApp.ipa Payload
          cd ../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyCarApp-IPA
          path: build/ipa/MyCarApp.ipa

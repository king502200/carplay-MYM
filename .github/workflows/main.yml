name: Build CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj \
            -scheme CarPlaySwiftUI \
            -archivePath build/CarPlaySwiftUI.xcarchive \
            -destination 'generic/platform=iOS'

      - name: Export IPA
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>ad-hoc</string><key>signingStyle</key><string>manual</string></dict></plist>' > exportOptions.plist
          
          xcodebuild -exportArchive \
            -archivePath build/CarPlaySwiftUI.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyCarApp-IPA
          path: build/ipa/*.ipa

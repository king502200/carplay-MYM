name: Build CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Force Disable Signing
        run: |
          # هذا الأمر يقوم بمسح "فريق التطوير" من إعدادات المشروع ليتوقف عن طلب الشهادة
          sed -i '' 's/DevelopmentTeam = [A-Z0-9]*;//g' CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;//g' CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj/project.pbxproj

      - name: Build and Package
        run: |
          # البناء بصيغة Simulator لتجنب قيود الحماية
          xcodebuild build \
            -project CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj \
            -scheme CarPlaySwiftUI \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

          # تجميع الملفات يدوياً في ملف IPA
          mkdir -p build/Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r MyCarApp.ipa Payload
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyCarApp-IPA
          path: build/MyCarApp.ipa

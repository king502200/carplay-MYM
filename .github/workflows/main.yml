name: Build CarPlay IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Archive (No Signing)
        run: |
          xcodebuild archive \
            -project CarPlaySwiftUI/CarPlaySwiftUI.xcodeproj \
            -scheme CarPlaySwiftUI \
            -archivePath build/CarPlaySwiftUI.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Manually
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/CarPlaySwiftUI.xcarchive/Products/Applications/*.app build/ipa/Payload/
          cd build/ipa
          zip -r MyCarApp.ipa Payload
          cd ../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MyCarApp-IPA
          path: build/ipa/MyCarApp.ipa
